{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "database-manager.fullname" . }}-manager-rolebinding
  labels:
    {{- include "database-manager.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "database-manager.fullname" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "database-manager.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}

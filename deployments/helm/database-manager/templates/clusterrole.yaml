{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "database-manager.fullname" . }}-manager-role
  labels:
    {{- include "database-manager.labels" . | nindent 4 }}
rules:
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - create
  - get
  - list
  - update
  - patch
- apiGroups:
  - iot.hauke.cloud
  resources:
  - databases
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - iot.hauke.cloud
  resources:
  - databases/finalizers
  verbs:
  - update
- apiGroups:
  - iot.hauke.cloud
  resources:
  - databases/status
  verbs:
  - get
  - patch
  - update
{{- with .Values.rbac.rules }}
{{- toYaml . | nindent 0 }}
{{- end }}
{{- end }}
